[build]
  # No committed lockfile is used here on purpose: the local lockfile pins
  # packages to an internal Artifactory registry that Netlify cannot reach.
  # Resolve fresh against the public npm registry instead.
  command = "npm install --include=dev --legacy-peer-deps && npm run build"
  publish = "apps/desktop/dist"

[build.environment]
  NODE_VERSION = "22"
  # Force the public registry (Netlify only) so installs don't hit the
  # unreachable corporate Artifactory host.
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
  # Applies to Netlify's automatic dependency install step.
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback: serve index.html for any client-side route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
