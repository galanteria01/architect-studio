[build]
  # Deterministic install from the committed root lockfile. `npm ci` installs
  # every workspace (incl. devDependencies like typescript/vite); --include=dev
  # guards against NODE_ENV=production omitting them.
  command = "npm ci --include=dev && npm run build"
  publish = "apps/desktop/dist"

[build.environment]
  # Match the local toolchain (npm 10.x) where the build is known-good.
  NODE_VERSION = "22"

# SPA fallback: serve index.html for any client-side route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
