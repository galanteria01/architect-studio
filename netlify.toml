[build]
  # Explicitly install with devDependencies (typescript, vite, etc.) at the
  # repo root, then build the desktop web app. The explicit install avoids
  # Netlify's auto-install omitting devDependencies in this workspace setup.
  command = "npm install --include=dev --workspaces --include-workspace-root && npm run build"
  publish = "apps/desktop/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for any client-side route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
